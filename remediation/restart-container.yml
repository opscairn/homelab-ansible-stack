---
# Remediation: restart an exited/unhealthy Docker container
# Called by remediation-bridge with -e "target_host=<host>"
# The container name is inferred from alert labels by the bridge.

- name: REMEDIATION | Restart container on {{ target_host | default('undefined') }}
  hosts: "{{ target_host }}"
  become: false
  vars:
    container: "{{ container_name | default('') }}"

  tasks:

    - name: PRE-FLIGHT | Require target_host
      tags: [deploy]
      ansible.builtin.assert:
        that: target_host is defined and target_host != ''
        fail_msg: "target_host must be set"

    - name: PRE-FLIGHT | List all stopped/exited containers
      tags: [deploy]
      ansible.builtin.command: docker ps -a --filter status=exited --filter status=dead --format "{{ '{{' }}.Names{{ '}}' }}"
      register: stopped_containers
      changed_when: false

    - name: PRE-FLIGHT | Report stopped containers
      tags: [deploy]
      ansible.builtin.debug:
        msg: "Stopped containers on {{ target_host }}: {{ stopped_containers.stdout_lines | join(', ') if stopped_containers.stdout_lines else 'none' }}"

    - name: REMEDIATE | Restart specific container (if provided)
      ansible.builtin.command: docker restart {{ container }}
      when: container != '' and container in stopped_containers.stdout
      register: specific_restart
      changed_when: specific_restart.rc == 0

    - name: REMEDIATE | Restart all stopped containers (if no specific container)
      ansible.builtin.command: docker start {{ item }}
      loop: "{{ stopped_containers.stdout_lines }}"
      when: container == '' and stopped_containers.stdout_lines | length > 0
      register: bulk_restart
      changed_when: true

    - name: VALIDATE | Wait and check running containers
      tags: [deploy, validate]
      ansible.builtin.command: docker ps --format "{{ '{{' }}.Names{{ '}}' }}"
      register: running_containers
      changed_when: false

    - name: VALIDATE | Confirm restart worked
      tags: [deploy, validate]
      ansible.builtin.debug:
        msg: "Running containers after remediation: {{ running_containers.stdout_lines | join(', ') }}"
