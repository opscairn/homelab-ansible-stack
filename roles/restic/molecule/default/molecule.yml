---
# Molecule test configuration for the restic role.
# Driver: Docker (default). Requires Docker on the test machine.
# Run: molecule test   (full lifecycle)
#      molecule converge  (apply role only)
#      molecule verify    (run assertions only)

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: restic-debian-bookworm
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    host_vars:
      restic-debian-bookworm:
        restic_repo_path: /tmp/test-restic-repo
        restic_password_file: /tmp/restic_pass
        restic_password: "molecule-test-password"
        restic_backup_paths:
          - /etc
        restic_exclude_paths:
          - /tmp
          - /var/cache
        restic_pause_services: []

verifier:
  name: ansible

scenario:
  # Skipping idempotence: restic backup/prune/check are command tasks
  # that always report changed (they run a real backup each time).
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
