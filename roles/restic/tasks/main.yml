---
# roles/restic/tasks/main.yml

- name: Deploy Restic password file
  ansible.builtin.copy:
    content: "{{ restic_password }}"
    dest: "{{ restic_password_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Ensure Restic password file exists
  ansible.builtin.file:
    path: "{{ restic_password_file }}"
    state: file
    owner: root
    group: root
    mode: "0600"

# --- NFS Stale Handle Cleanup ---
- name: Attempt to stat Restic repo path (may fail if stale)
  ansible.builtin.stat:
    path: "{{ restic_repo_path }}"
  register: restic_repo_stat
  ignore_errors: true

- name: Unmount stale NFS mount if stat failed
  ansible.builtin.command: umount -l "{{ restic_repo_path }}"
  when: restic_repo_stat.failed
  changed_when: true
  failed_when: false

- name: Remount Restic NFS path
  ansible.builtin.command: mount "{{ restic_repo_path }}"
  when: restic_repo_stat.failed
  changed_when: true
  failed_when: false
# -------------------------------

# --- Backup with safe service pausing ---
- name: Restic backup with service pausing
  block:

    - name: Pause critical services before backup
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop: "{{ restic_pause_services | default([]) }}"
      when: restic_pause_services | length > 0

    - name: Initialize Restic repository (if not already)
      ansible.builtin.command: >
        restic init
        --repo "{{ restic_repo_path }}"
        --password-file "{{ restic_password_file }}"
      args:
        creates: "{{ restic_repo_path }}/config"

    - name: Run Restic backup
      ansible.builtin.command: >
        restic
        --repo "{{ restic_repo_path }}"
        --password-file "{{ restic_password_file }}"
        backup
        {{ restic_backup_paths | join(' ') }}
        {% if restic_exclude_paths %}
        --exclude {{ restic_exclude_paths | join(' --exclude ') }}
        {% endif %}
      register: restic_backup
      changed_when: restic_backup.stdout is search("snapshot ")

  rescue:

    - name: Ensure services are restarted after backup failure
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ restic_pause_services | default([]) }}"
      when: restic_pause_services | length > 0

  always:

    - name: Ensure services are restarted after backup success
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ restic_pause_services | default([]) }}"
      when: restic_pause_services | length > 0

# --- Prune and check logic ---
- name: Prune old snapshots
  ansible.builtin.command: >
    restic
    --repo "{{ restic_repo_path }}"
    --password-file "{{ restic_password_file }}"
    forget
    --prune
    --keep-last {{ restic_prune.keep_last }}
    --keep-weekly {{ restic_prune.keep_weekly }}
    --keep-monthly {{ restic_prune.keep_monthly }}
  register: restic_prune_result
  changed_when: restic_prune_result.rc == 0
  failed_when: restic_prune_result.rc != 0 and
               'repository is already locked' not in restic_prune_result.stderr
  notify:
    - Remove stale restic lock
    - Retry restic prune after unlock
  when: restic_prune is defined

- name: Check repository integrity
  ansible.builtin.command: >
    restic
    --repo "{{ restic_repo_path }}"
    --password-file "{{ restic_password_file }}"
    check
  register: restic_check_result
  changed_when: false
  failed_when: restic_check_result.rc != 0 and
               'repository is already locked' not in restic_check_result.stderr
  notify:
    - Remove stale restic lock
    - Retry restic check after unlock
