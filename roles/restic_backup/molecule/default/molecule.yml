---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: restic-backup-debian-bookworm
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    host_vars:
      restic-backup-debian-bookworm:
        restic_repo_path: /tmp/test-restic-repo
        restic_password_file: /tmp/restic_pass
        restic_password: "molecule-test-password"
        restic_backup_paths:
          - /etc
        restic_exclude_paths:
          - /tmp
          - /var/cache
        restic_pause_services: []
        restic_env_file: /tmp/restic.env

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotency
    - verify
    - cleanup
    - destroy
