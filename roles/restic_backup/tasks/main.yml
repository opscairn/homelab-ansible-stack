---
# Minimal main that deploys units, enables timer, then applies overrides + verify

- name: Deploy restic service unit
  ansible.builtin.template:
    src: restic-backup.service.j2
    dest: /etc/systemd/system/restic-backup.service
    mode: "0644"
  notify: [Systemd daemon-reload]

- name: Deploy restic timer unit
  ansible.builtin.template:
    src: restic-backup.timer.j2
    dest: /etc/systemd/system/restic-backup.timer
    mode: "0644"
  notify: [Systemd daemon-reload]

- name: Ensure timer is enabled and started
  ansible.builtin.systemd:
    name: restic-backup.timer
    enabled: true
    state: started

- name: Apply root and host overrides
  ansible.builtin.import_tasks: 30-root-and-host-overrides.yml

- name: Flush handlers before verify (ensure daemon-reload runs first)
  ansible.builtin.meta: flush_handlers

- name: Run verification checks
  ansible.builtin.import_tasks: 99-verify.yml
