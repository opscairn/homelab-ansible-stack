---
- name: USERS | Create ops user
  ansible.builtin.user:
    name: "{{ hardening_ops_user }}"
    shell: "{{ hardening_ops_user_shell }}"
    groups: "{{ hardening_ops_user_groups }}"
    append: true
    create_home: true
    state: present

- name: USERS | Ensure .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ hardening_ops_user }}/.ssh"
    state: directory
    owner: "{{ hardening_ops_user }}"
    group: "{{ hardening_ops_user }}"
    mode: "0700"

- name: USERS | Deploy SSH authorized keys
  ansible.posix.authorized_key:
    user: "{{ hardening_ops_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ hardening_ops_ssh_pubkeys }}"
  when: hardening_ops_ssh_pubkeys | length > 0

- name: USERS | Grant passwordless sudo to ops user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ hardening_ops_user }}"
    content: "{{ hardening_ops_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: USERS | Disable root password login
  ansible.builtin.user:
    name: root
    password: "!"
    password_lock: true
  when: hardening_disable_root_login
