---
# Deploy Restic backup fleet (standalone playbook — does NOT use the restic or restic_backup roles)
# Installs Restic, configures backup scripts + systemd timers on all backup_servers.
# Uses restic_sftp_repo (SFTP transport) — contrast with the restic role which uses restic_repo_path (local/NFS).
# Run: ansible-playbook playbooks/deploy-restic-fleet.yml --check --limit <one-host>
# Run: ansible-playbook playbooks/deploy-restic-fleet.yml

- name: Deploy Restic backup to fleet
  hosts: backup_servers
  become: true
  vars:
    restic_repository: "{{ restic_sftp_repo }}"
    restic_user: "{{ ansible_user }}"
    restic_group: "{{ ansible_user }}"

  tasks:
    - name: INSTALL | Install restic
      tags: [deploy]
      ansible.builtin.apt:
        name: restic
        state: present
        update_cache: true

    - name: INSTALL | Create restic config directory
      tags: [deploy]
      ansible.builtin.file:
        path: "/home/{{ restic_user }}/.restic"
        state: directory
        owner: "{{ restic_user }}"
        group: "{{ restic_group }}"
        mode: '0700'

    - name: INSTALL | Create restic password file (raw text only)
      tags: [deploy]
      ansible.builtin.copy:
        content: "{{ vault_restic_password }}"
        dest: "/home/{{ restic_user }}/.restic/restic.env"
        owner: "{{ restic_user }}"
        group: "{{ restic_group }}"
        mode: '0600'

    - name: CONFIG | Create exclude patterns directory
      tags: [deploy, configure]
      ansible.builtin.file:
        path: /etc/restic
        state: directory
        mode: '0755'

    - name: CONFIG | Deploy exclude patterns
      tags: [deploy, configure]
      ansible.builtin.copy:
        dest: /etc/restic/exclude.txt
        mode: '0644'
        content: |
          # Restic exclude patterns for {{ inventory_hostname }}
          # Generated by Ansible - DO NOT EDIT MANUALLY
          /dev
          /lost+found
          /proc
          /run
          /sys
          /tmp
          /var/cache
          /var/tmp
          /var/lib/apt/lists
          /var/lib/systemd/coredump
          /var/log/journal
          /var/lib/docker/overlay2
          /var/lib/docker/aufs
          /var/lib/docker/image
          /var/lib/docker/containers/*/*-json.log
          /var/lib/containerd/io.containerd.snapshotter.v1.overlayfs
          /var/lib/containerd/io.containerd.content.v1.content
          /var/lib/kubelet/pods

    - name: CONFIG | Deploy backup script (with exit code 3 tolerance)
      tags: [deploy, configure]
      ansible.builtin.copy:
        dest: /usr/local/bin/restic-backup.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Restic Backup Script for {{ inventory_hostname }}
          # Generated by Ansible - DO NOT EDIT MANUALLY

          set -euo pipefail

          RESTIC_REPOSITORY="{{ restic_repository }}"
          RESTIC_PASSWORD_FILE="/home/{{ restic_user }}/.restic/restic.env"
          LOG_FILE="/var/log/restic-backup.log"

          log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
          }

          log "=== Restic Backup Started on {{ inventory_hostname }} ==="

          # Run backup (exit code 3 = some files skipped, acceptable)
          set +e
          sudo -u {{ restic_user }} restic -r "$RESTIC_REPOSITORY" \
              --password-file "$RESTIC_PASSWORD_FILE" \
              --exclude-file=/etc/restic/exclude.txt \
              --host {{ inventory_hostname }} \
              --tag backrest:plan=host-ansible-root \
              backup /etc /var >> "$LOG_FILE" 2>&1
          BACKUP_EXIT=$?
          set -e

          if [ $BACKUP_EXIT -eq 0 ] || [ $BACKUP_EXIT -eq 3 ]; then
              log "Backup completed (exit code: $BACKUP_EXIT)"
          else
              log "ERROR: Backup failed with exit code $BACKUP_EXIT"
              exit 1
          fi

          # Prune old snapshots
          log "Running forget/prune..."
          if sudo -u {{ restic_user }} restic -r "$RESTIC_REPOSITORY" \
              --password-file "$RESTIC_PASSWORD_FILE" \
              forget \
              --host {{ inventory_hostname }} \
              --keep-daily 7 \
              --keep-weekly 4 \
              --keep-monthly 6 \
              --keep-yearly 1 \
              --prune >> "$LOG_FILE" 2>&1; then
              log "Prune completed successfully"
          else
              log "WARNING: Prune failed with exit code $?"
          fi

          # Check repository health
          log "Checking repository..."
          if sudo -u {{ restic_user }} restic -r "$RESTIC_REPOSITORY" \
              --password-file "$RESTIC_PASSWORD_FILE" \
              check --read-data-subset=5% >> "$LOG_FILE" 2>&1; then
              log "Repository check passed"
          else
              log "WARNING: Repository check failed with exit code $?"
          fi

          log "=== Restic Backup Completed ==="

    - name: INSTALL | Initialize restic repository (if needed)
      tags: [deploy]
      become: true
      become_user: "{{ restic_user }}"
      ansible.builtin.shell: |
        restic -r {{ restic_repository }} \
          --password-file /home/{{ restic_user }}/.restic/restic.env \
          snapshots 2>&1 || \
        restic -r {{ restic_repository }} \
          --password-file /home/{{ restic_user }}/.restic/restic.env \
          init
      register: restic_init
      changed_when: "'created restic repository' in restic_init.stdout"
      failed_when: false
      when: not ansible_check_mode

    - name: SYSTEMD | Create systemd service
      tags: [deploy, configure]
      ansible.builtin.copy:
        dest: /etc/systemd/system/restic-backup.service
        mode: '0644'
        content: |
          [Unit]
          Description=Restic Backup Service
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/restic-backup.sh

          [Install]
          WantedBy=multi-user.target

    - name: SYSTEMD | Create systemd drop-in directory
      tags: [deploy, configure]
      ansible.builtin.file:
        path: /etc/systemd/system/restic-backup.service.d
        state: directory
        mode: '0755'

    - name: SYSTEMD | Create user-alignment drop-in
      tags: [deploy, configure]
      ansible.builtin.copy:
        dest: /etc/systemd/system/restic-backup.service.d/user-alignment.conf
        mode: '0644'
        content: |
          [Service]
          User={{ restic_user }}
          Group={{ restic_group }}
          Environment=RESTIC_PASSWORD_FILE=/home/{{ restic_user }}/.restic/restic.env

    - name: SYSTEMD | Create log-to-journal drop-in
      tags: [deploy, configure]
      ansible.builtin.copy:
        dest: /etc/systemd/system/restic-backup.service.d/log-to-file.conf
        mode: '0644'
        content: |
          [Service]
          StandardOutput=journal
          StandardError=journal

    - name: SYSTEMD | Create backup timer
      tags: [deploy, configure]
      ansible.builtin.copy:
        dest: /etc/systemd/system/restic-backup.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Restic Backup Timer

          [Timer]
          OnCalendar=daily
          RandomizedDelaySec=1h
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: SYSTEMD | Create log file with correct permissions
      tags: [deploy, configure]
      ansible.builtin.file:
        path: /var/log/restic-backup.log
        state: touch
        owner: "{{ restic_user }}"
        group: adm
        mode: '0640'
        modification_time: preserve
        access_time: preserve

    - name: SYSTEMD | Reload systemd
      tags: [deploy, configure]
      ansible.builtin.systemd:
        daemon_reload: true

    - name: SYSTEMD | Enable and start timer
      tags: [deploy, configure]
      ansible.builtin.systemd:
        name: restic-backup.timer
        enabled: true
        state: started
      when: not ansible_check_mode

    - name: VALIDATE | Run initial backup test
      tags: [deploy, validate]
      ansible.builtin.command: /usr/local/bin/restic-backup.sh
      register: initial_backup
      changed_when: false
      failed_when: initial_backup.rc not in [0]
      when: not ansible_check_mode

    - name: VALIDATE | Report status
      tags: [deploy, validate]
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: Initial backup completed — check /var/log/restic-backup.log"

- name: Verify all deployments
  hosts: backup_servers
  become: true
  tasks:
    - name: VALIDATE | Check service status
      tags: [deploy, validate]
      ansible.builtin.shell: set -o pipefail && systemctl status restic-backup.service | head -10
      register: service_status
      failed_when: false
      changed_when: false
      when: not ansible_check_mode

    - name: VALIDATE | Check timer status
      tags: [deploy, validate]
      ansible.builtin.command: systemctl status restic-backup.timer
      register: timer_status
      failed_when: not ansible_check_mode and 'active (waiting)' not in timer_status.stdout
      changed_when: false
      when: not ansible_check_mode

    - name: VALIDATE | Verify snapshots exist
      tags: [deploy, validate]
      become: true
      become_user: "{{ ansible_user }}"
      ansible.builtin.command: >
        restic -r {{ restic_sftp_repo }}
          --password-file /home/{{ ansible_user }}/.restic/restic.env
          snapshots --host {{ inventory_hostname }} --latest 1
      register: snapshot_check
      changed_when: false
      when: not ansible_check_mode

    - name: VALIDATE | Display verification results
      tags: [deploy, validate]
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Timer: {{ 'ACTIVE' if 'active (waiting)' in timer_status.stdout else 'FAILED' }}"
          - "Latest snapshot: {{ snapshot_check.stdout_lines[-1] if (snapshot_check.stdout_lines | default([])) else 'NONE' }}"
